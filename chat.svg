      <stop offset="100%" stop-color="#161b22"></stop>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-10%" width="108%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"></feDropShadow>
    </filter>
    <clipPath id="cardClip">
      <rect width="680" height="330" rx="16"></rect>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    

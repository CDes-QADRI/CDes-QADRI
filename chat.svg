    <rect y="0" width="680" height="52" fill="url(#headerGrad)"></rect>
    <line x1="0" y1="52" x2="680" y2="52" stroke="#30363d" stroke-width="0.5"></line>

    
    <circle cx="30" cy="26" r="4.5" fill="#70a5fd"></circle>
    <circle cx="42" cy="26" r="4.5" fill="#70a5fd" opacity="0.5"></circle>

      <stop offset="0%" stop-color="#0A84FF"></stop>
      <stop offset="100%" stop-color="#5E5CE6"></stop>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#30D158"></stop>
      <stop offset="100%" stop-color="#25A244"></stop>
    </linearGradient>

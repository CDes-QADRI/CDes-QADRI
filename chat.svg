    <text x="340" y="30" fill="#c9d1d9" font-family="-apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Messages</text>
    
    <text x="640" y="30" fill="#484f58" font-family="-apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Helvetica, Arial, sans-serif" font-size="11" font-weight="500" text-anchor="end">now</text>

    
    <rect x="28" y="70" width="440" height="46" rx="20" fill="url(#blueGrad)" filter="url(#shadow)"></rect>
    
